<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Skyfall Mage2 - WebGPU Material Field Test</title>
    <link rel="icon" href="data:," />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #050507;
        color: #d7e4ff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        touch-action: none;
        user-select: none;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #050507;
      }

      .fatal {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        padding: 24px;
        background: #050507;
        color: #d7e4ff;
        text-align: center;
        line-height: 1.6;
      }

      .fatal.is-visible {
        display: grid;
      }

      .fatal span {
        display: block;
        max-width: 560px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <canvas id="fieldCanvas" aria-label="WebGPU material field test"></canvas>
    <div id="fatal" class="fatal" role="alert">
      <div>
        <strong>WebGPU is required</strong>
        <span>This page intentionally has no CPU, Canvas2D, or WebGL fallback.</span>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
